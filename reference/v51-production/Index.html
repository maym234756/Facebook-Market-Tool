<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
      :root {
        --navy-900: #061a38;
        --navy-800: #0a2550;
        --navy-700: #12366d;
        --blue-600: #1a56a3;
        --blue-500: #2f73c7;
        --aqua-400: #79d0d8;
        --aqua-300: #9adfe4;
        --white: #ffffff;
        --slate-50: #f5f8fc;
        --slate-100: #e8eef7;
        --slate-200: #d5dfed;
        --slate-500: #64748b;
        --text-dark: #12233d;
        --success: #0f8b6d;
        --danger: #b42318;
        --shadow: 0 10px 24px rgba(3, 22, 51, 0.18);
        --radius: 16px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(180deg, var(--navy-900) 0%, #0b244a 100%);
        margin: 0;
        padding: 8px;
        color: var(--text-dark);
      }

      .wrap {
        max-width: 1200px;
        margin: 0 auto;
      }

      .brand-header {
        background: linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.05));
        border: 1px solid rgba(121, 208, 216, 0.22);
        border-radius: 16px;
        padding: 10px 16px;
        margin-bottom: 10px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(4px);
      }

      .brand-header-inner {
        display: grid;
        grid-template-columns: 180px 1fr 180px;
        align-items: center;
        gap: 10px;
      }

      .brand-logo-left,
      .brand-logo-right {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 50px;
      }

      .brand-logo-left img,
      .brand-logo-right img {
        max-width: 100%;
        max-height: 50px;
        object-fit: contain;
        display: block;
      }

      .brand-title-wrap {
        text-align: center;
        color: var(--white);
      }

      .brand-title {
        margin: 0;
        font-size: 26px;
        font-weight: 800;
        letter-spacing: 0.4px;
        line-height: 1.1;
        color: var(--white);
      }

      .brand-subtitle {
        margin-top: 3px;
        color: var(--aqua-300);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 1.1px;
        text-transform: uppercase;
      }

      .card {
        background: rgba(255,255,255,0.98);
        border-radius: var(--radius);
        padding: 12px 14px;
        margin-bottom: 10px;
        box-shadow: var(--shadow);
        border: 1px solid rgba(10, 37, 80, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        color: var(--navy-800);
      }

      .muted {
        color: var(--slate-500);
        font-size: 13px;
      }

      .nav {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 4px;
        font-size: 14px;
      }
<? if (embedParam === 'salesforce') { ?>
      .nav { display: none !important; }
<? } ?>

      .nav a {
        text-decoration: none;
        font-weight: 800;
        color: var(--navy-700);
        padding: 4px 10px;
        border-radius: 999px;
        transition: 0.2s ease;
      }

      .nav a:hover {
        background: rgba(121, 208, 216, 0.16);
        color: var(--navy-900);
      }

      .nav span {
        color: #8aa0bf;
        font-weight: 700;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
      }

      .grid-2 {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 800;
        margin-bottom: 6px;
        color: var(--navy-700);
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }

      select, input, textarea, button {
        width: 100%;
        box-sizing: border-box;
        border-radius: 10px;
        border: 1px solid var(--slate-200);
        padding: 7px 10px;
        font-size: 13px;
        transition: 0.2s ease;
      }

      select:focus,
      input:focus,
      textarea:focus {
        outline: none;
        border-color: var(--aqua-400);
        box-shadow: 0 0 0 3px rgba(121, 208, 216, 0.22);
      }

      textarea {
        min-height: 110px;
        resize: vertical;
      }

      input[readonly],
      textarea[readonly] {
        background: #f8fbff;
      }

      button {
        color: var(--white);
        border: none;
        cursor: pointer;
        font-weight: 800;
        letter-spacing: 0.2px;
        box-shadow: 0 6px 14px rgba(18, 54, 109, 0.22);
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 18px rgba(18, 54, 109, 0.26);
      }

      button.generate-btn {
        background: linear-gradient(135deg, #169c5a, #0f8b6d);
      }

      button.secondary {
        background: linear-gradient(135deg, #4a658d, #27446e);
      }

      button.save-btn {
        background: linear-gradient(135deg, #c4362a, #8f1f18);
      }

      button:disabled {
        opacity: .6;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      .full {
        grid-column: 1 / -1;
      }

      .status {
        margin-top: 12px;
        font-size: 14px;
        font-weight: 800;
      }

      .photo-toolbar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 8px;
        margin-bottom: 10px;
      }

      .photo-toolbar button {
        width: auto;
        min-width: 140px;
      }

      .photo-gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 12px;
        margin-top: 12px;
      }

      .photo-item {
        position: relative;
      }

      .photo-check {
        position: absolute;
        top: 8px;
        left: 8px;
        width: 18px;
        height: 18px;
        z-index: 2;
        cursor: pointer;
        accent-color: var(--blue-600);
      }

      .photo-thumb-link {
        display: block;
        text-decoration: none;
      }

      .photo-thumb {
        width: 100%;
        height: 110px;
        object-fit: cover;
        border-radius: 12px;
        border: 1px solid var(--slate-200);
        background: #f8fbff;
        box-shadow: 0 4px 10px rgba(18, 54, 109, 0.12);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      .photo-thumb:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 16px rgba(18, 54, 109, 0.18);
      }

      .photo-empty {
        color: var(--slate-500);
        font-size: 13px;
      }

      @media (max-width: 1000px) {
        .brand-header-inner {
          grid-template-columns: 1fr;
        }

        .brand-logo-left,
        .brand-logo-right {
          min-height: 40px;
        }

        .brand-logo-left img,
        .brand-logo-right img {
          max-height: 40px;
        }

        .brand-title {
          font-size: 22px;
        }

        .grid,
        .grid-2,
        .actions {
          grid-template-columns: 1fr;
        }

        .photo-toolbar button {
          width: 100%;
        }
      }
    </style>
  </head>

    <script>
      var currentRegion = '';
      var currentPhotoUrls = [];
      var _embedSuffix = (function() {
        var em = '<?= embedParam ?>';
        var ex = '<?= expiresParam ?>';
        var sg = '<?= sigParam ?>';
        return (em && ex && sg)
          ? '&embed=' + encodeURIComponent(em) + '&expires=' + encodeURIComponent(ex) + '&sig=' + encodeURIComponent(sg)
          : '';
      })();
      var regionLoadToken = 0;

      function setStatus(message, isError) {
        var el = document.getElementById('status');
        el.textContent = message || '';
        el.style.color = isError ? '#b42318' : '#0f8b6d';
      }

      function getRegionFromUrl() {
        var params = new URLSearchParams(window.location.search);
        return params.get('region') || '';
      }

      function getSavedRegion() {
        return localStorage.getItem('selectedRegion') || '';
      }

      function saveRegion(region) {
        localStorage.setItem('selectedRegion', region || '');
      }

      function updateNavLinks() {
        var encoded = currentRegion ? encodeURIComponent(currentRegion) : '';
        var suffix = (encoded ? '&region=' + encoded : '') + _embedSuffix;

        document.getElementById('navIndex').href = '<?= appUrl ?>?page=index' + suffix;
        document.getElementById('navListings').href = '<?= appUrl ?>?page=listings' + suffix;
        document.getElementById('navAnalytics').href = '<?= appUrl ?>?page=analytics' + suffix;
        document.getElementById('navManager').href = '<?= appUrl ?>?page=manager' + suffix;
      }

      function renderPhotos(images) {
        currentPhotoUrls = images || [];

        var gallery = document.getElementById('photoGallery');
        gallery.innerHTML = '';

        if (!images || !images.length) {
          gallery.innerHTML = '<div class="photo-empty">No photos found for this unit.</div>';
          return;
        }

        images.forEach(function(url, index) {
          var item = document.createElement('div');
          item.className = 'photo-item';

          var checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.className = 'photo-check';
          checkbox.dataset.url = url;
          checkbox.title = 'Select photo ' + (index + 1);

          var link = document.createElement('a');
          link.href = url;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.className = 'photo-thumb-link';
          link.title = 'Open photo ' + (index + 1);

          var img = document.createElement('img');
          img.src = url;
          img.alt = 'Boat photo ' + (index + 1);
          img.className = 'photo-thumb';
          img.loading = 'lazy';
          img.draggable = true;

          link.appendChild(img);
          item.appendChild(checkbox);
          item.appendChild(link);
          gallery.appendChild(item);
        });
      }

      function getSelectedPhotoUrls() {
        return Array.from(document.querySelectorAll('.photo-check:checked'))
          .map(function(cb) { return cb.dataset.url; })
          .filter(Boolean);
      }

      function selectAllPhotos() {
        document.querySelectorAll('.photo-check').forEach(function(cb) {
          cb.checked = true;
        });
        setStatus('All photos selected.');
      }

      function base64ToUint8Array(base64) {
        var binaryString = atob(base64);
        var len = binaryString.length;
        var bytes = new Uint8Array(len);
        for (var i = 0; i < len; i++) {
          bytes[i] = binaryString.charCodeAt(i);
        }
        return bytes;
      }

      function downloadUrlsAsZip(urls, zipName) {
        if (!urls || !urls.length) {
          setStatus('No photos selected.', true);
          return;
        }

        setStatus('Preparing photo download...');

        google.script.run
          .withSuccessHandler(async function(files) {
            try {
              if (!files || !files.length) {
                setStatus('No photos were returned for download.', true);
                return;
              }

              var validFiles = files.filter(function(file) {
                return file && !file.error && file.base64;
              });

              if (!validFiles.length) {
                var firstError = files.find(function(file) { return file && file.error; });
                setStatus('Failed to download photos: ' + (firstError ? firstError.error : 'No valid files returned.'), true);
                return;
              }

              var zip = new JSZip();

              validFiles.forEach(function(file, index) {
                var bytes = base64ToUint8Array(file.base64);
                zip.file(file.fileName || ('photo-' + (index + 1)), bytes, { binary: true });
              });

              var content = await zip.generateAsync({ type: 'blob' });
              var objectUrl = URL.createObjectURL(content);
              var a = document.createElement('a');

              a.href = objectUrl;
              a.download = zipName;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);

              URL.revokeObjectURL(objectUrl);

              var failedCount = files.length - validFiles.length;
              if (failedCount > 0) {
                setStatus('Download ready. ' + failedCount + ' photo(s) could not be fetched.', true);
              } else {
                setStatus('Photo download ready.');
              }
            } catch (err) {
              setStatus('Failed to build ZIP: ' + err.message, true);
            }
          })
          .withFailureHandler(function(err) {
            setStatus((err && err.message) ? ('Failed to download photos: ' + err.message) : 'Failed to download photos.', true);
          })
          .getPhotoDownloadPayload(urls);
      }

      function downloadSelectedPhotos() {
        var selected = getSelectedPhotoUrls();
        var stockNum = document.getElementById('stockNum').value || 'boat';
        downloadUrlsAsZip(selected, stockNum + '-selected-photos.zip');
      }

      function downloadAllPhotos() {
        var stockNum = document.getElementById('stockNum').value || 'boat';
        downloadUrlsAsZip(currentPhotoUrls, stockNum + '-all-photos.zip');
      }

      function clearBoatDetails() {
        document.getElementById('classification').value = '';
        document.getElementById('boatInfo').value = '';
        document.getElementById('daysListed').value = '';
        document.getElementById('stockNum').value = '';
        document.getElementById('price').value = '';
        document.getElementById('hours').value = '';
        document.getElementById('motorInfo').value = '';
        document.getElementById('options').value = '';
        document.getElementById('websiteDesc').value = '';
        document.getElementById('websiteOptions').value = '';
        document.getElementById('aiListing').value = '';
        renderPhotos([]);
      }

      function clearSelectorsAfterRegion() {
        document.getElementById('salesperson').innerHTML = '<option value="">Select a salesperson</option>';
        document.getElementById('boatClass').innerHTML = '<option value="">Select a class</option>';
        document.getElementById('boat').innerHTML = '<option value="">Select a boat</option>';
        document.getElementById('bmbBoard').value = '';
        document.getElementById('video').value = '';
        document.getElementById('link').value = '';
        clearBoatDetails();
      }

      function populateRegions(regions) {
        var select = document.getElementById('region');
        select.innerHTML = '<option value="">Select a region</option>';

        (regions || []).forEach(function(region) {
          var option = document.createElement('option');
          option.value = region;
          option.textContent = region;
          select.appendChild(option);
        });

        if (currentRegion) {
          select.value = currentRegion;
        }
      }

      function populateSalespeople(salespeople) {
        var select = document.getElementById('salesperson');
        select.innerHTML = '<option value="">Select a salesperson</option>';

        (salespeople || []).forEach(function(name) {
          var option = document.createElement('option');
          option.value = name;
          option.textContent = name;
          select.appendChild(option);
        });
      }

      function populateClasses(classes) {
        var select = document.getElementById('boatClass');
        select.innerHTML = '<option value="">Select a class</option>';

        (classes || []).forEach(function(item) {
          var option = document.createElement('option');
          option.value = item;
          option.textContent = item;
          select.appendChild(option);
        });
      }

      function onRegionChange() {
        currentRegion = document.getElementById('region').value || '';
        saveRegion(currentRegion);
        updateNavLinks();
        clearSelectorsAfterRegion();

        if (!currentRegion) {
          setStatus('Select a region first.', true);
          return;
        }

        loadRegionData();
      }

      function loadRegionData() {
        if (!currentRegion) {
          setStatus('Select a region first.', true);
          return;
        }

        var loadToken = ++regionLoadToken;
        var pendingRequests = 2;
        var hasError = false;

        setStatus('Loading region data...');

        google.script.run
          .withSuccessHandler(function(salespeople) {
            if (loadToken !== regionLoadToken || hasError) {
              return;
            }

            populateSalespeople(salespeople || []);
            pendingRequests -= 1;

            if (pendingRequests === 0) {
              setStatus('');
            }
          })
          .withFailureHandler(function(err) {
            if (loadToken !== regionLoadToken || hasError) {
              return;
            }

            hasError = true;
            setStatus((err && err.message) ? err.message : 'Failed to load salespeople.', true);
          })
          .getRegionSalespeople(currentRegion);

        google.script.run
          .withSuccessHandler(function(classes) {
            if (loadToken !== regionLoadToken || hasError) {
              return;
            }

            populateClasses(classes || []);
            pendingRequests -= 1;

            if (pendingRequests === 0) {
              setStatus('');
            }
          })
          .withFailureHandler(function(err) {
            if (loadToken !== regionLoadToken || hasError) {
              return;
            }

            hasError = true;
            setStatus((err && err.message) ? err.message : 'Failed to load classes.', true);
          })
          .getRegionClasses(currentRegion);
      }

      function loadBoats() {
        clearBoatDetails();

        if (!currentRegion) {
          setStatus('Select a region first.', true);
          return;
        }

        var className = document.getElementById('boatClass').value;
        var boatSelect = document.getElementById('boat');
        boatSelect.innerHTML = '<option value="">Select a boat</option>';

        if (!className) {
          return;
        }

        setStatus('Loading boats...');

        google.script.run
          .withSuccessHandler(function(boats) {
            boatSelect.innerHTML = '<option value="">Select a boat</option>';

            (boats || []).forEach(function(boat) {
              var option = document.createElement('option');
              option.value = boat.stockNum;
              option.textContent = boat.boatInfo + (boat.stockNum ? ' — ' + boat.stockNum : '');
              boatSelect.appendChild(option);
            });

            setStatus('');
          })
          .withFailureHandler(function(err) {
            setStatus((err && err.message) ? err.message : 'Failed to load boats.', true);
          })
          .getBoatsByClass(currentRegion, className);
      }

      function loadBoatDetails() {
        clearBoatDetails();

        if (!currentRegion) {
          setStatus('Select a region first.', true);
          return;
        }

        var stockNum = document.getElementById('boat').value;
        if (!stockNum) {
          return;
        }

        setStatus('Loading boat details...');

        google.script.run
          .withSuccessHandler(function(data) {
            if (!data) {
              setStatus('Boat not found.', true);
              return;
            }

            document.getElementById('classification').value = data.classification || '';
            document.getElementById('boatInfo').value = data.boatInfo || '';
            document.getElementById('daysListed').value = data.daysListed || '';
            document.getElementById('stockNum').value = data.stockNum || '';
            document.getElementById('price').value = data.price || '';
            document.getElementById('hours').value = data.hours || '';
            document.getElementById('motorInfo').value = data.motorInfo || '';
            document.getElementById('options').value = data.options || '';
            document.getElementById('websiteDesc').value = data.websiteDesc || '';
            document.getElementById('websiteOptions').value = data.websiteOptions || '';
            renderPhotos(data.images || []);
            setStatus('');
          })
          .withFailureHandler(function(err) {
            setStatus((err && err.message) ? err.message : 'Failed to load boat details.', true);
          })
          .getBoatDetails(currentRegion, stockNum);
      }

      function getPayload() {
        return {
          salespersonName: document.getElementById('salesperson').value,
          classification: document.getElementById('classification').value,
          boatInfo: document.getElementById('boatInfo').value,
          stockNum: document.getElementById('stockNum').value,
          price: document.getElementById('price').value,
          hours: document.getElementById('hours').value,
          motorInfo: document.getElementById('motorInfo').value,
          options: document.getElementById('options').value,
          websiteDesc: document.getElementById('websiteDesc').value,
          websiteOptions: document.getElementById('websiteOptions').value,
          aiListing: document.getElementById('aiListing').value,
          bmbBoard: document.getElementById('bmbBoard').value,
          video: document.getElementById('video').value,
          link: document.getElementById('link').value
        };
      }

      function generateListing() {
        if (!currentRegion) {
          setStatus('Select a region first.', true);
          return;
        }

        var payload = getPayload();

        if (!payload.salespersonName) {
          setStatus('Select a salesperson first.', true);
          return;
        }

        if (!payload.boatInfo) {
          setStatus('Choose a boat first.', true);
          return;
        }

        document.getElementById('generateBtn').disabled = true;
        setStatus('Generating listing...');

        google.script.run
          .withSuccessHandler(function(text) {
            document.getElementById('aiListing').value = text || '';
            document.getElementById('generateBtn').disabled = false;
            setStatus('Listing generated.');
          })
          .withFailureHandler(function(err) {
            document.getElementById('generateBtn').disabled = false;
            setStatus((err && err.message) ? err.message : 'Failed to generate listing.', true);
          })
          .generateListing(currentRegion, payload);
      }

      function copyListing() {
        var text = document.getElementById('aiListing').value;
        if (!text) {
          setStatus('Nothing to copy yet.', true);
          return;
        }

        navigator.clipboard.writeText(text).then(function() {
          setStatus('Listing copied.');
        });
      }

      function saveListing() {
        if (!currentRegion) {
          setStatus('Select a region first.', true);
          return;
        }

        var payload = getPayload();

        if (!payload.salespersonName) {
          setStatus('Select a salesperson first.', true);
          return;
        }

        if (!payload.boatInfo || !payload.aiListing) {
          setStatus('Choose a boat and generate a listing first.', true);
          return;
        }

        if (!payload.bmbBoard) {
          setStatus('BMB Board? is required before saving.', true);
          return;
        }

        if (!payload.video) {
          setStatus('Video? is required before saving.', true);
          return;
        }

        setStatus('Saving listing...');

        google.script.run
          .withSuccessHandler(function() {
            setStatus('Listing saved to salesperson tab.');
          })
          .withFailureHandler(function(err) {
            setStatus((err && err.message) ? err.message : 'Failed to save listing.', true);
          })
          .saveListing(currentRegion, payload);
      }

      function init() {
        currentRegion = getRegionFromUrl() || getSavedRegion() || '';
        updateNavLinks();

        google.script.run
          .withSuccessHandler(function(regions) {
            populateRegions(regions || []);

            if (currentRegion) {
              document.getElementById('region').value = currentRegion;
              saveRegion(currentRegion);
              loadRegionData();
            } else {
              clearSelectorsAfterRegion();
              setStatus('Select a region first.', true);
            }
          })
          .withFailureHandler(function(err) {
            setStatus((err && err.message) ? err.message : 'Failed to load regions.', true);
          })
          .getRegions();
      }

      window.addEventListener('load', init);
    </script>
  </body>

  operator-facing workflow for selecting region, salesperson, boat class, and boat record, then

  Operational role:
  - Renders the primary data-entry and review interface for listing generation
