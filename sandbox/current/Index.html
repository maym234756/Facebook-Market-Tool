<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      :root {
        --navy-900: #061a38;
        --navy-800: #0a2550;
        --navy-700: #12366d;
        --blue-600: #1a56a3;
        --blue-500: #2f73c7;
        --aqua-400: #79d0d8;
        --aqua-300: #9adfe4;
        --white: #ffffff;
        --slate-50: #f5f8fc;
        --slate-100: #e8eef7;
        --slate-200: #d5dfed;
        --slate-500: #64748b;
        --text-dark: #12233d;
        --success: #0f8b6d;
        --danger: #b42318;
        --shadow: 0 10px 24px rgba(3, 22, 51, 0.18);
        --radius: 16px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(180deg, var(--navy-900) 0%, #0b244a 100%);
        margin: 0;
        padding: 24px;
        color: var(--text-dark);
      }

      .wrap {
        max-width: 1200px;
        margin: 0 auto;
      }

      .brand-header {
        background: linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.05));
        border: 1px solid rgba(121, 208, 216, 0.22);
        border-radius: 22px;
        padding: 18px 22px;
        margin-bottom: 18px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(4px);
      }

      .brand-header-inner {
        display: grid;
        grid-template-columns: 220px 1fr 220px;
        align-items: center;
        gap: 18px;
      }

      .brand-logo-left,
      .brand-logo-right {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 72px;
      }

      .brand-logo-left img,
      .brand-logo-right img {
        max-width: 100%;
        max-height: 72px;
        object-fit: contain;
        display: block;
      }

      .brand-title-wrap {
        text-align: center;
        color: var(--white);
      }

      .brand-title {
        margin: 0;
        font-size: 34px;
        font-weight: 800;
        letter-spacing: 0.4px;
        line-height: 1.1;
        color: var(--white);
      }

      .brand-subtitle {
        margin-top: 6px;
        color: var(--aqua-300);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 1.1px;
        text-transform: uppercase;
      }

      .card {
        background: rgba(255,255,255,0.98);
        border-radius: var(--radius);
        padding: 20px;
        margin-bottom: 18px;
        box-shadow: var(--shadow);
        border: 1px solid rgba(10, 37, 80, 0.08);
      }

      h1 {
        margin: 0 0 16px;
        color: var(--navy-800);
      }

      .muted {
        color: var(--slate-500);
        font-size: 13px;
      }

      .nav {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 8px;
        font-size: 15px;
      }

      .nav a {
        text-decoration: none;
        font-weight: 800;
        color: var(--navy-700);
        padding: 8px 12px;
        border-radius: 999px;
        transition: 0.2s ease;
      }

      .nav a:hover {
        background: rgba(121, 208, 216, 0.16);
        color: var(--navy-900);
      }

      .nav span {
        color: #8aa0bf;
        font-weight: 700;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
      }

      .grid-2 {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 800;
        margin-bottom: 6px;
        color: var(--navy-700);
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }

      select, input, textarea, button {
        width: 100%;
        box-sizing: border-box;
        border-radius: 12px;
        border: 1px solid var(--slate-200);
        padding: 11px 12px;
        font-size: 14px;
        transition: 0.2s ease;
      }

      select:focus,
      input:focus,
      textarea:focus {
        outline: none;
        border-color: var(--aqua-400);
        box-shadow: 0 0 0 3px rgba(121, 208, 216, 0.22);
      }

      textarea {
        min-height: 110px;
        resize: vertical;
      }

      input[readonly],
      textarea[readonly] {
        background: #f8fbff;
      }

      button {
        color: var(--white);
        border: none;
        cursor: pointer;
        font-weight: 800;
        letter-spacing: 0.2px;
        box-shadow: 0 6px 14px rgba(18, 54, 109, 0.22);
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 18px rgba(18, 54, 109, 0.26);
      }

      button.generate-btn {
        background: linear-gradient(135deg, #169c5a, #0f8b6d);
      }

      button.secondary {
        background: linear-gradient(135deg, #4a658d, #27446e);
      }

      button.save-btn {
        background: linear-gradient(135deg, #c4362a, #8f1f18);
      }

      button:disabled {
        opacity: .6;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      .full {
        grid-column: 1 / -1;
      }

      .status {
        margin-top: 12px;
        font-size: 14px;
        font-weight: 800;
      }

      @media (max-width: 1000px) {
        .brand-header-inner {
          grid-template-columns: 1fr;
        }

        .brand-logo-left,
        .brand-logo-right {
          min-height: 50px;
        }

        .brand-logo-left img,
        .brand-logo-right img {
          max-height: 56px;
        }

        .brand-title {
          font-size: 28px;
        }

        .grid,
        .grid-2,
        .actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand-header">
        <div class="brand-header-inner">
          <div class="brand-logo-left">
            <img
              src="https://www.premierboatingcenters.com/wp-content/uploads/2024/10/premier-boating-centers-tx.png"
              alt="Premier Boating Centers"
            />
          </div>

          <div class="brand-title-wrap">
            <h1 class="brand-title">PBC/OMG Facebook Listings Tool</h1>
            <div class="brand-subtitle">Internal Listing Generator & Management Console</div>
          </div>

          <div class="brand-logo-right">
            <img
              src="https://www.oceanmarine.boats/wp-content/uploads/2025/03/ocean-marine-boats.png"
              alt="Ocean Marine Group"
            />
          </div>
        </div>
      </div>

      <div class="card">
        <div class="nav">
          <a id="navIndex" href="#">Listing Generator</a>
          <span>|</span>
          <a id="navListings" href="#">Salesperson Listings</a>
          <span>|</span>
          <a id="navAnalytics" href="#">Analytics</a>
          <span>|</span>
          <a id="navManager" href="#">Manager View</a>
        </div>

        <h1>Listing Generator</h1>
        <div class="muted">Select a region, salesperson, class, and boat. Then generate and save the Marketplace listing.</div>
      </div>

      <div class="card">
        <div class="grid">
          <div>
            <label for="region">Region</label>
            <select id="region" onchange="onRegionChange()">
              <option value="">Select a region</option>
            </select>
          </div>

          <div>
            <label for="salesperson">Salesperson</label>
            <select id="salesperson">
              <option value="">Select a salesperson</option>
            </select>
          </div>

          <div>
            <label for="boatClass">Class</label>
            <select id="boatClass" onchange="loadBoats()">
              <option value="">Select a class</option>
            </select>
          </div>

          <div class="full">
            <label for="boat">Boat</label>
            <select id="boat" onchange="loadBoatDetails()">
              <option value="">Select a boat</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="grid-2">
          <div>
            <label>Classification</label>
            <input id="classification" readonly>
          </div>

          <div>
            <label>Boat Info</label>
            <input id="boatInfo" readonly>
          </div>

          <div>
            <label>Stock #</label>
            <input id="stockNum" readonly>
          </div>

          <div>
            <label>Price</label>
            <input id="price" readonly>
          </div>

          <div>
            <label>Hours</label>
            <input id="hours" readonly>
          </div>

          <div>
            <label>Motor</label>
            <input id="motorInfo" readonly>
          </div>

          <div class="full">
            <label>Used Options</label>
            <textarea id="options" readonly></textarea>
          </div>

          <div class="full">
            <label>Website Description</label>
            <textarea id="websiteDesc" readonly></textarea>
          </div>

          <div class="full">
            <label>Website Options</label>
            <textarea id="websiteOptions" readonly></textarea>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="grid-2">
          <div>
            <label for="bmbBoard">BMB Board?</label>
            <select id="bmbBoard">
              <option value="">Select Y or N</option>
              <option value="Y">Y</option>
              <option value="N">N</option>
            </select>
          </div>

          <div>
            <label for="video">Video?</label>
            <select id="video">
              <option value="">Select Y or N</option>
              <option value="Y">Y</option>
              <option value="N">N</option>
            </select>
          </div>

          <div class="full">
            <label for="link">Link</label>
            <input id="link" type="text" placeholder="Paste listing link here">
          </div>
        </div>
      </div>

      <div class="card">
        <div class="actions">
          <button id="generateBtn" class="generate-btn" onclick="generateListing()">Generate Listing</button>
          <button class="secondary" onclick="copyListing()">Copy Listing</button>
          <button class="save-btn" onclick="saveListing()">Save Listing</button>
        </div>

        <div style="margin-top:16px;">
          <label>AI Generated Listing</label>
          <textarea id="aiListing" style="min-height:260px;"></textarea>
        </div>

        <div id="status" class="status"></div>
      </div>
    </div>

    <script>
      var currentRegion = '';

      function setStatus(message, isError) {
        var el = document.getElementById('status');
        el.textContent = message || '';
        el.style.color = isError ? '#b42318' : '#0f8b6d';
      }

      function getRegionFromUrl() {
        var params = new URLSearchParams(window.location.search);
        return params.get('region') || '';
      }

      function getSavedRegion() {
        return localStorage.getItem('selectedRegion') || '';
      }

      function saveRegion(region) {
        localStorage.setItem('selectedRegion', region || '');
      }

      function updateNavLinks() {
        var encoded = currentRegion ? encodeURIComponent(currentRegion) : '';
        var suffix = encoded ? '&region=' + encoded : '';

        document.getElementById('navIndex').href = '<?= appUrl ?>?page=index' + suffix;
        document.getElementById('navListings').href = '<?= appUrl ?>?page=listings' + suffix;
        document.getElementById('navAnalytics').href = '<?= appUrl ?>?page=analytics' + suffix;
        document.getElementById('navManager').href = '<?= appUrl ?>?page=manager' + (encoded ? '&region=' + encoded : '');
      }

      function clearBoatDetails() {
        document.getElementById('classification').value = '';
        document.getElementById('boatInfo').value = '';
        document.getElementById('stockNum').value = '';
        document.getElementById('price').value = '';
        document.getElementById('hours').value = '';
        document.getElementById('motorInfo').value = '';
        document.getElementById('options').value = '';
        document.getElementById('websiteDesc').value = '';
        document.getElementById('websiteOptions').value = '';
        document.getElementById('aiListing').value = '';
      }

      function clearSelectorsAfterRegion() {
        document.getElementById('salesperson').innerHTML = '<option value="">Select a salesperson</option>';
        document.getElementById('boatClass').innerHTML = '<option value="">Select a class</option>';
        document.getElementById('boat').innerHTML = '<option value="">Select a boat</option>';
        document.getElementById('bmbBoard').value = '';
        document.getElementById('video').value = '';
        document.getElementById('link').value = '';
        clearBoatDetails();
      }

      function populateRegions(regions) {
        var select = document.getElementById('region');
        select.innerHTML = '<option value="">Select a region</option>';

        (regions || []).forEach(function(region) {
          var option = document.createElement('option');
          option.value = region;
          option.textContent = region;
          select.appendChild(option);
        });

        if (currentRegion) {
          select.value = currentRegion;
        }
      }

      function populateSalespeople(salespeople) {
        var select = document.getElementById('salesperson');
        select.innerHTML = '<option value="">Select a salesperson</option>';

        (salespeople || []).forEach(function(name) {
          var option = document.createElement('option');
          option.value = name;
          option.textContent = name;
          select.appendChild(option);
        });
      }

      function populateClasses(classes) {
        var select = document.getElementById('boatClass');
        select.innerHTML = '<option value="">Select a class</option>';

        (classes || []).forEach(function(item) {
          var option = document.createElement('option');
          option.value = item;
          option.textContent = item;
          select.appendChild(option);
        });
      }

      function onRegionChange() {
        currentRegion = document.getElementById('region').value || '';
        saveRegion(currentRegion);
        updateNavLinks();
        clearSelectorsAfterRegion();

        if (!currentRegion) {
          setStatus('Select a region first.', true);
          return;
        }

        loadRegionData();
      }

      function loadRegionData() {
        if (!currentRegion) {
          setStatus('Select a region first.', true);
          return;
        }

        setStatus('Loading region data...');

        google.script.run
          .withSuccessHandler(function(data) {
            populateSalespeople(data.salespeople || []);
            populateClasses(data.classes || []);
            setStatus('');
          })
          .withFailureHandler(function(err) {
            setStatus((err && err.message) ? err.message : 'Failed to load region data.', true);
          })
          .getInitialData(currentRegion);
      }

      function loadBoats() {
        clearBoatDetails();

        if (!currentRegion) {
          setStatus('Select a region first.', true);
          return;
        }

        var className = document.getElementById('boatClass').value;
        var boatSelect = document.getElementById('boat');
        boatSelect.innerHTML = '<option value="">Select a boat</option>';

        if (!className) {
          return;
        }

        setStatus('Loading boats...');

        google.script.run
          .withSuccessHandler(function(boats) {
            boatSelect.innerHTML = '<option value="">Select a boat</option>';

            (boats || []).forEach(function(boat) {
              var option = document.createElement('option');
              option.value = boat.stockNum;
              option.textContent = boat.boatInfo + (boat.stockNum ? ' — ' + boat.stockNum : '');
              boatSelect.appendChild(option);
            });

            setStatus('');
          })
          .withFailureHandler(function(err) {
            setStatus((err && err.message) ? err.message : 'Failed to load boats.', true);
          })
          .getBoatsByClass(currentRegion, className);
      }

      function loadBoatDetails() {
        clearBoatDetails();

        if (!currentRegion) {
          setStatus('Select a region first.', true);
          return;
        }

        var stockNum = document.getElementById('boat').value;
        if (!stockNum) {
          return;
        }

        setStatus('Loading boat details...');

        google.script.run
          .withSuccessHandler(function(data) {
            if (!data) {
              setStatus('Boat not found.', true);
              return;
            }

            document.getElementById('classification').value = data.classification || '';
            document.getElementById('boatInfo').value = data.boatInfo || '';
            document.getElementById('stockNum').value = data.stockNum || '';
            document.getElementById('price').value = data.price || '';
            document.getElementById('hours').value = data.hours || '';
            document.getElementById('motorInfo').value = data.motorInfo || '';
            document.getElementById('options').value = data.options || '';
            document.getElementById('websiteDesc').value = data.websiteDesc || '';
            document.getElementById('websiteOptions').value = data.websiteOptions || '';
            setStatus('');
          })
          .withFailureHandler(function(err) {
            setStatus((err && err.message) ? err.message : 'Failed to load boat details.', true);
          })
          .getBoatDetails(currentRegion, stockNum);
      }

      function getPayload() {
        return {
          salespersonName: document.getElementById('salesperson').value,
          classification: document.getElementById('classification').value,
          boatInfo: document.getElementById('boatInfo').value,
          stockNum: document.getElementById('stockNum').value,
          price: document.getElementById('price').value,
          hours: document.getElementById('hours').value,
          motorInfo: document.getElementById('motorInfo').value,
          options: document.getElementById('options').value,
          websiteDesc: document.getElementById('websiteDesc').value,
          websiteOptions: document.getElementById('websiteOptions').value,
          aiListing: document.getElementById('aiListing').value,
          bmbBoard: document.getElementById('bmbBoard').value,
          video: document.getElementById('video').value,
          link: document.getElementById('link').value
        };
      }

      function generateListing() {
        if (!currentRegion) {
          setStatus('Select a region first.', true);
          return;
        }

        var payload = getPayload();

        if (!payload.salespersonName) {
          setStatus('Select a salesperson first.', true);
          return;
        }

        if (!payload.boatInfo) {
          setStatus('Choose a boat first.', true);
          return;
        }

        document.getElementById('generateBtn').disabled = true;
        setStatus('Generating listing...');

        google.script.run
          .withSuccessHandler(function(text) {
            document.getElementById('aiListing').value = text || '';
            document.getElementById('generateBtn').disabled = false;
            setStatus('Listing generated.');
          })
          .withFailureHandler(function(err) {
            document.getElementById('generateBtn').disabled = false;
            setStatus((err && err.message) ? err.message : 'Failed to generate listing.', true);
          })
          .generateListing(currentRegion, payload);
      }

      function copyListing() {
        var text = document.getElementById('aiListing').value;
        if (!text) {
          setStatus('Nothing to copy yet.', true);
          return;
        }

        navigator.clipboard.writeText(text).then(function() {
          setStatus('Listing copied.');
        });
      }

      function saveListing() {
        if (!currentRegion) {
          setStatus('Select a region first.', true);
          return;
        }

        var payload = getPayload();

        if (!payload.salespersonName) {
          setStatus('Select a salesperson first.', true);
          return;
        }

        if (!payload.boatInfo || !payload.aiListing) {
          setStatus('Choose a boat and generate a listing first.', true);
          return;
        }

        if (!payload.bmbBoard) {
          setStatus('BMB Board? is required before saving.', true);
          return;
        }

        if (!payload.video) {
          setStatus('Video? is required before saving.', true);
          return;
        }

        setStatus('Saving listing...');

        google.script.run
          .withSuccessHandler(function() {
            setStatus('Listing saved to salesperson tab.');
          })
          .withFailureHandler(function(err) {
            setStatus((err && err.message) ? err.message : 'Failed to save listing.', true);
          })
          .saveListing(currentRegion, payload);
      }

      function init() {
        currentRegion = getRegionFromUrl() || getSavedRegion() || '';
        updateNavLinks();

        google.script.run
          .withSuccessHandler(function(regions) {
            populateRegions(regions || []);

            if (currentRegion) {
              document.getElementById('region').value = currentRegion;
              saveRegion(currentRegion);
              loadRegionData();
            } else {
              clearSelectorsAfterRegion();
              setStatus('Select a region first.', true);
            }
          })
          .withFailureHandler(function(err) {
            setStatus((err && err.message) ? err.message : 'Failed to load regions.', true);
          })
          .getRegions();
      }

      window.addEventListener('load', init);
    </script>
  </body>
</html>
