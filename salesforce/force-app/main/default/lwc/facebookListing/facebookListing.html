<template>
    <div class="container">
        <lightning-tabset ontabselect={handleTabSelect}>

            <!-- LISTINGS tab -->
            <lightning-tab label="Salesperson Listings" value="listings">
                <template lwc:if={listingsLoading}>
                    <div class="spinner-wrap">
                        <lightning-spinner alternative-text="Loading…" size="large"></lightning-spinner>
                    </div>
                </template>
                <template lwc:if={listingsError}>
                    <div class="error-box">
                        <lightning-icon icon-name="utility:error" variant="error" size="small"></lightning-icon>
                        <span>{listingsError}</span>
                    </div>
                </template>
                <template lwc:if={listingsUrl}>
                    <iframe title="Listings" src={listingsUrl} class="listing-frame"
                        sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox"
                        allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>
                </template>
            </lightning-tab>

            <!-- ANALYTICS tab -->
            <lightning-tab label="Regional View" value="analytics">
                <template lwc:if={analyticsLoading}>
                    <div class="spinner-wrap">
                        <lightning-spinner alternative-text="Loading…" size="large"></lightning-spinner>
                    </div>
                </template>
                <template lwc:if={analyticsError}>
                    <div class="error-box">
                        <lightning-icon icon-name="utility:error" variant="error" size="small"></lightning-icon>
                        <span>{analyticsError}</span>
                    </div>
                </template>
                <template lwc:if={analyticsUrl}>
                    <iframe title="Analytics" src={analyticsUrl} class="listing-frame"
                        sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox"
                        allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>
                </template>
            </lightning-tab>

            <!-- MANAGER tab -->
            <lightning-tab label="Company-Wide View" value="manager">
                <template lwc:if={managerLoading}>
                    <div class="spinner-wrap">
                        <lightning-spinner alternative-text="Loading…" size="large"></lightning-spinner>
                    </div>
                </template>
                <template lwc:if={managerError}>
                    <div class="error-box">
                        <lightning-icon icon-name="utility:error" variant="error" size="small"></lightning-icon>
                        <span>{managerError}</span>
                    </div>
                </template>
                <template lwc:if={managerUrl}>
                    <iframe title="Manager" src={managerUrl} class="listing-frame"
                        sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox"
                        allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>
                </template>
            </lightning-tab>

            <!-- CREATE LISTING tab — native Salesforce form -->
            <lightning-tab label="Listing Generator" value="create">
                <c-facebook-listing-create></c-facebook-listing-create>
            </lightning-tab>

        </lightning-tabset>
    </div>
</template>
