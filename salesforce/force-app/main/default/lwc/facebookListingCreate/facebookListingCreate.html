<template>
    <div class="create-wrap">
        <!-- Branded header matching Apps Script -->
        <div class="brand-header">
            <div class="brand-header-inner">
                <div class="brand-logo-left">
                    <img src="https://www.premierboatingcenters.com/wp-content/uploads/2024/10/premier-boating-centers-tx.png" alt="Premier Boating Centers" />
                </div>
                <div class="brand-title-wrap">
                    <h1 class="brand-title">PBC/OMG Facebook Listings Tool</h1>
                    <div class="brand-subtitle">Internal Listing Generator &amp; Management Console</div>
                </div>
                <div class="brand-logo-right">
                    <img src="https://www.oceanmarine.boats/wp-content/uploads/2025/03/ocean-marine-boats.png" alt="Ocean Marine Group" />
                </div>
            </div>
        </div>

        <!-- Step 1: Region + Salesperson -->
        <div class="form-section">
            <div class="field-row">
                <lightning-combobox
                    label="Region"
                    placeholder="Select region…"
                    value={region}
                    options={regionOptions}
                    onchange={handleRegionChange}
                    required>
                </lightning-combobox>

                <lightning-combobox
                    label="Salesperson"
                    placeholder="Select salesperson…"
                    value={salespersonName}
                    options={salespersonOptions}
                    disabled={noRegion}
                    onchange={handleSalespersonChange}
                    required>
                </lightning-combobox>
            </div>
        </div>

        <!-- Step 2: Boat selection -->
        <div class="form-section">
            <div class="field-row">
                <lightning-combobox
                    label="Boat Class"
                    placeholder="Select class…"
                    value={className}
                    options={classOptions}
                    disabled={noRegion}
                    onchange={handleClassChange}
                    required>
                </lightning-combobox>

                <lightning-combobox
                    label="Boat"
                    placeholder="Select boat…"
                    value={stockNum}
                    options={boatOptions}
                    disabled={noClass}
                    onchange={handleBoatChange}
                    required>
                </lightning-combobox>
            </div>

            <!-- Boat details read-only summary -->
            <template lwc:if={boatDetails}>
                <div class="details-grid">
                    <div class="detail-item">
                        <span class="detail-label">Classification</span>
                        <span class="detail-value">{boatDetails.classification}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Boat Info</span>
                        <span class="detail-value">{boatDetails.boatInfo}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Stock #</span>
                        <span class="detail-value">{boatDetails.stockNum}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Price</span>
                        <span class="detail-value">{boatDetails.price}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Hours</span>
                        <span class="detail-value">{boatDetails.hours}</span>
                    </div>
                    <div class="detail-item detail-wide">
                        <span class="detail-label">Motor</span>
                        <span class="detail-value">{boatDetails.motorInfo}</span>
                    </div>
                    <div class="detail-item detail-wide">
                        <span class="detail-label">Used Options</span>
                        <div class="detail-value detail-multiline">{boatDetails.options}</div>
                    </div>
                    <div class="detail-item detail-wide">
                        <span class="detail-label">Website Description</span>
                        <div class="detail-value detail-multiline">{boatDetails.websiteDesc}</div>
                    </div>
                    <div class="detail-item detail-wide">
                        <span class="detail-label">Website Options</span>
                        <div class="detail-value detail-multiline">{boatDetails.websiteOptions}</div>
                    </div>
                </div>
            </template>
        </div>

        <!-- Step 3: Optional fields -->
        <div class="form-section">
            <div class="field-row">
                <lightning-combobox
                    label="BMB Board?"
                    placeholder="Select Y or N"
                    value={bmbBoard}
                    options={ynOptions}
                    onchange={handleBmbChange}>
                </lightning-combobox>
                <lightning-combobox
                    label="Video?"
                    placeholder="Select Y or N"
                    value={video}
                    options={ynOptions}
                    onchange={handleVideoChange}>
                </lightning-combobox>
            </div>
            <lightning-input
                label="Link"
                placeholder="Paste listing link here"
                value={listingLink}
                type="text"
                onchange={handleLinkChange}>
            </lightning-input>
        </div>

        <!-- Step 4: Actions + AI Listing -->
        <div class="form-section">
            <div class="form-actions">
                <lightning-button
                    label="Generate Listing"
                    variant="brand"
                    icon-name="utility:sparkles"
                    disabled={cannotGenerate}
                    onclick={handleGenerate}>
                </lightning-button>
                <lightning-button
                    label="Copy Listing"
                    variant="neutral"
                    icon-name="utility:copy"
                    disabled={cannotCopy}
                    onclick={handleCopyListing}>
                </lightning-button>
                <lightning-button
                    label="Save Listing"
                    variant="success"
                    icon-name="utility:save"
                    disabled={cannotSave}
                    onclick={handleSave}>
                </lightning-button>
            </div>

            <template lwc:if={isGenerating}>
                <div class="spinner-inline">
                    <lightning-spinner alternative-text="Generating listing…" size="small"></lightning-spinner>
                    <span class="spinner-label">Generating listing…</span>
                </div>
            </template>
            <template lwc:if={isSaving}>
                <div class="spinner-inline">
                    <lightning-spinner alternative-text="Saving…" size="small"></lightning-spinner>
                    <span class="spinner-label">Saving to Google Sheets…</span>
                </div>
            </template>

            <span class="section-label">AI Generated Listing</span>
            <lightning-textarea
                label=""
                placeholder="Generated listing will appear here. You can edit it before saving."
                value={aiListing}
                rows="10"
                onchange={handleListingTextChange}>
            </lightning-textarea>
        </div>

        <!-- Error / success banners -->
        <template lwc:if={errorMessage}>
            <div class="banner banner-error">
                <lightning-icon icon-name="utility:error" variant="error" size="x-small"></lightning-icon>
                <span>{errorMessage}</span>
            </div>
        </template>
        <template lwc:if={successMessage}>
            <div class="banner banner-success">
                <lightning-icon icon-name="utility:success" variant="success" size="x-small"></lightning-icon>
                <span>{successMessage}</span>
            </div>
        </template>
    </div>
</template>
